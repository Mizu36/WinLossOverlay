<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Win Loss Overlay - Stats</title>
	<style>
		@font-face {
			font-family: "Futura Regular";
			src: url("../fonts/Futura Regular.ttf") format("truetype");
		}

		@font-face {
			font-family: "Valorant Font";
			src: url("../fonts/Valorant Font.ttf") format("truetype");
		}

		:root {
			color-scheme: dark;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: transparent;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 1;
			transition: opacity 250ms ease;
		}

		.stats-wrapper {
			display: flex;
			align-items: center;
			gap: 18px;
			justify-content: center;
			width: max-content;
			height: fit-content;
			padding: 12px 16px;
			color: #ffffff;
			text-shadow: 0 0 8px rgba(0, 0, 0, 0.65);
		}

		.game-logo {
			width: 84px;
			height: 84px;
			object-fit: contain;
			flex-shrink: 0;
		}

		.stats-content {
			position: relative;
			width: 520px;
			height: 92px;
			overflow: hidden;
		}

		.flip-panel {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: flex-start;
			gap: 8px;
			transition: transform 520ms cubic-bezier(0.2, 0.8, 0.2, 1);
		}

		.mode-label {
			font-size: 20px;
			letter-spacing: 0.8px;
			text-align: left;
		}

		.stat-row {
			display: flex;
			gap: 22px;
			flex-wrap: nowrap;
			font-size: 36px;
			line-height: 1;
			justify-content: flex-start;
		}

		.stat-value {
			white-space: nowrap;
		}
	</style>
</head>
<body>
	<div class="stats-wrapper">
		<img id="game-logo" class="game-logo" alt="Game Logo">
		<div class="stats-content" id="stats-flip-viewport">
			<div class="flip-panel" id="stats-panel-primary">
				<div class="mode-label" id="primary-mode-label">Current Session</div>
				<div class="stat-row">
					<div class="stat-value" id="primary-wins-value">W: 0</div>
					<div class="stat-value" id="primary-losses-value">L: 0</div>
					<div class="stat-value" id="primary-draws-value">D: 0</div>
					<div class="stat-value" id="primary-ratio-value">R: 0.00</div>
				</div>
			</div>
			<div class="flip-panel" id="stats-panel-secondary">
				<div class="mode-label" id="secondary-mode-label">Current Session</div>
				<div class="stat-row">
					<div class="stat-value" id="secondary-wins-value">W: 0</div>
					<div class="stat-value" id="secondary-losses-value">L: 0</div>
					<div class="stat-value" id="secondary-draws-value">D: 0</div>
					<div class="stat-value" id="secondary-ratio-value">R: 0.00</div>
				</div>
			</div>
		</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
